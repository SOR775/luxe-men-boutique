{% extends 'base.html' %}

{% block title %}{{ post.title }} — Luxe Men{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 px-4 py-16 dark:bg-luxe-dark sm:px-6 lg:px-8">
  <div class="mx-auto max-w-4xl">
    <a href="{% url 'marketing:blog_list' %}" class="text-sm font-semibold text-luxe-gold">← Back to journal</a>
    <article class="mt-6 rounded-3xl border border-gray-200 bg-white p-8 shadow-sm dark:border-gray-800 dark:bg-gray-900">
      <p class="text-xs uppercase tracking-[0.3em] text-luxe-gold">{{ post.created_at|date:'M d, Y' }}</p>
      <h1 class="mt-3 font-serif text-3xl font-bold text-gray-900 dark:text-white sm:text-4xl">{{ post.title }}</h1>
      <p class="mt-4 text-lg leading-8 text-gray-600 dark:text-gray-300">{{ post.content }}</p>
    </article>
  </div>
</div>
{% endblock %}
