<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Login Code — {{ site_name }}</title>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; padding: 32px; border-radius: 8px; border: 1px solid #e5e5e5; }
    .header { text-align: center; margin-bottom: 24px; }
    .title { font-size: 24px; margin: 0; color: #111; }
    .code { display: inline-block; margin: 24px 0; padding: 18px 32px; font-size: 28px; letter-spacing: 0.16em; background: #f8f0d8; color: #111; border-radius: 8px; }
    .text { font-size: 16px; line-height: 1.8; color: #555; }
    .footer { margin-top: 30px; font-size: 12px; color: #999; }
    a { color: #c9a84c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">Your {{ site_name }} login code</h1>
    </div>
    <p class="text">Hi {{ user.first_name|default:user.email }},</p>
    <p class="text">Use the code below to sign in to your account. This code expires in {{ expiry_minutes }} minutes.</p>
    <div class="code">{{ code }}</div>
    <p class="text">If you did not request this code, you can safely ignore this email.</p>
    <p class="footer">This code is one-time use only.</p>
  </div>
</body>
</html>
